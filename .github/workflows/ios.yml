name: iOS CI
on:
  workflow_dispatch:
  workflow_call:

jobs:
  ios:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: true

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Set HAXEPATH
        run: echo "HAXEPATH=$HAXE_STD_PATH/.." >> $GITHUB_ENV

      - name: Install Haxe dependencies
        run: |
          haxelib git hxcpp https://github.com/FunkinCrew/hxcpp --quiet
          haxelib install format --quiet
          haxelib install hxp --quiet

      - name: Configure Lime
        run: haxelib dev lime ${{ github.workspace }}

      - name: Remove Previous NDLLs
        run: |
          rm -rf ./ndll
          mkdir ./ndll

      - name: Rebuild Lime
        run: |
          haxelib run lime rebuild hxcpp
          haxelib run lime rebuild ios -eval -nocolor -release

      - name: Upload Artifact (ndll/iPhone)
        uses: actions/upload-artifact@v7.0.0
        with:
          name: iPhone-NDLL
          path: ndll/iPhone
          if-no-files-found: error
